<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Grupos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Grupos</h1>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Tipo</th>
        <th>Orixen</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="grupo : ${grupos}">
        <td th:text="${grupo.id}"></td>
        <td th:text="${grupo.nombre}"></td>
        <td th:text="${grupo.tipo}"></td>
        <td th:text="${grupo.orixen}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
